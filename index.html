<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Erth Tool</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <h1>Map Erth Tool</h1>

      <div class="lang-row" aria-label="Language selector">
        <button class="lang-btn active" data-lang="en">English</button>
        <button class="lang-btn" data-lang="el">Ελληνικά</button>
        <button class="lang-btn" data-lang="sq">Shqip</button>
      </div>

      <label for="searchInput" id="searchLabel">Search places</label>
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="cafes, shops, museum..." />
        <button id="searchBtn">Search</button>
      </div>

      <label for="categorySelect" id="chooseLabel">Or choose a category</label>
      <div class="search-row">
        <select id="categorySelect">
          <option value="cafe">Cafes</option>
          <option value="restaurant">Restaurants</option>
          <option value="shop">Shops</option>
          <option value="hospital">Hospitals</option>
          <option value="school">Schools</option>
          <option value="hotel">Hotels</option>
          <option value="tourism">Tourism</option>
        </select>
        <button id="categoryBtn">Find</button>
      </div>

      <div class="left-actions">
        <button class="action-chip yellow" id="showCountriesBtn">Show countries</button>
        <button class="action-chip yellow" id="walkModeBtn">Walk mode: OFF</button>
      </div>

      <div class="status-panel">
        <strong id="statusTitle">How to use</strong>
        <p id="statusText">Press walk mode, then click anywhere on map to move little by little.</p>
      </div>

      <div class="results-header">
        <span id="leftTitle">Quick actions</span>
        <span id="rightTitle">Selected</span>
      </div>
      <div class="results-grid">
        <ul id="leftList" class="list yellow-list"></ul>
        <ul id="rightList" class="list blue-list"></ul>
      </div>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="script.js"></script>
</body>
</html>
